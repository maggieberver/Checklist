<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist</title>
    <!-- React/ReactDOM and Babel moved to end of body for proper loading -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<style>
    /* 1. Tachado y opacidad solo para el texto de la tarea */
    .completed td:first-child {
        text-decoration: line-through;
        color: gray;
        opacity: 0.5;
    }

    /* 2. Opacidad para el resto de las celdas (fecha y botones) */
    .completed td:nth-child(2),
    .completed td:nth-child(3) {
        opacity: 0.5;
    }

    /* 3. Efecto visual en los botones cuando la fila está completada */
    .completed td button {
        /* Mantenemos el cursor normal para que sepa que puede hacer clic */
        cursor: pointer; 
        /* Pero se ven más tenues para no distraer */
        filter: grayscale(50%); 
    }

    /* Opcional: Que los botones recuperen color al pasar el mouse (hover) */
    .completed td button:hover {
        opacity: 1;
        filter: grayscale(0%);
    }
</style>
<body>
    <div id="root">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="bi bi-clipboard2-check-fill"></i> Checklist
                </a>
                <!--<button id="trash" class="btn btn-outline-light btn-sm">
                    Trash <i class="bi bi-trash"></i>
                </button>-->
            </div>
        </nav>

        <div class="container mt-5" > 
            
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <input type="text" id="inputTask" class="form-control" placeholder="Task name">
                </div>
                <div class="col-md-4">
                    <input type="date" id="inputDate" class="form-control">
                </div>
                <div class="col-md-2 d-flex align-items-start">
                    <button id="actionButton" class="btn btn-primary w-100" onclick="addTask()">Add</button>
                    <button id="cancelButton" class="btn btn-secondary ms-2 d-none" onclick="cancelEdit()">Cancel</button>
                </div>
            </div>

            <div class="table-responsive rounded-3 border shadow-sm overflow-hidden">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th> <i class="bi bi-bell-fill"></i> Task</th>
                            <th style="width: 130px;"><i class="bi bi-calendar-fill"></i> Deadline</th>
                            <th class="text-center" style="width: 120px;"></th>
                            
                        </tr>
                    </thead>
                    <tbody id="taskTable"></tbody>
                </table>
            </div>

        </div>

        <footer class="bg-light text-center text-muted py-4 mt-5 border-top" style="position: fixed; bottom: 0; width: 100%;">
            <div class="container">
                <div class="row">
                    <div class="col-12">
                        <div class="mb-3">
                            <a href="#" class="text-muted me-3"><i class="bi bi-github"></i></a>
                            <a href="#" class="text-muted me-3"><i class="bi bi-linkedin"></i></a>
                            <a href="#" class="text-muted"><i class="bi bi-envelope"></i></a>
                        </div>
                        <div class="text-secondary small">
                            &copy; 2026 - Maggie Berver. All rights reserved.
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
